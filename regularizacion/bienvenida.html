<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>¡Gracias por tu compra! - Reto de Materias</title>
  <style>

    .container { background: white; border-radius: 16px; padding: 40px; max-width: 440px; width: 90%; border: 1px solid #e0e6f0; box-shadow: 0 25px 60px rgba(99,102,241,.15); text-align: center; }
    .check { font-size: 48px; margin-bottom: 12px; }
    h1 { color: #3b4fd8; font-size: 24px; margin-bottom: 8px; }
    p { color: #4b5563; font-size: 15px; margin-bottom: 28px; line-height: 1.5; }
    .btn { display: block; width: 100%; padding: 14px; border-radius: 14px; font-size: 16px; font-weight: bold; cursor: pointer; text-decoration: none; margin-bottom: 12px; }
    .btn-primary { background: linear-gradient(135deg, #6366f1, #4f46e5); color: white; box-shadow: 0 8px 25px rgba(99,102,241,.25); }
    .ayuda { margin-top: 20px; font-size: 12px; color: #9ca3af; }
    .ayuda a { color: #3b4fd8; font-weight: bold; text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="check">🎉</div>

    <a href="register.html" class="btn btn-primary">Crear mi cuenta</a>

      ¿Dudas? Escríbenos a <a href="mailto:academia.nexoia@gmail.com">academia.nexoia@gmail.com</a>

  </div>
</body>
</html>
