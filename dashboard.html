<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard | Maestro de Bolsillo</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }

    body {
      min-height: 100vh;
      background: #f0f4fe;
      color: #141a2e;
    }

    header {
      background: white;
      padding: 20px 8%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
    }

    .logo {
      font-size: 22px;
      font-weight: 800;
      color: #3b4fd8;
    }

    .user-badge {
      background: #dce3ff;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 15px;
      font-weight: 700;
      color: #3b4fd8;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logout-btn {
      background: none;
      border: 2px solid #3b4fd8;
      color: #3b4fd8;
      padding: 6px 14px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      transition: .2s;
    }

    .logout-btn:hover {
      background: #3b4fd8;
      color: white;
    }

    .hero {
      padding: 50px 8% 30px;
    }

    .hero-card {
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: white;
      border-radius: 32px;
      padding: 40px;
      text-align: center;
      box-shadow: 0 25px 60px rgba(99,102,241,.25);
    }

    .hero-card h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    .hero-card p {
      font-size: 17px;
      opacity: .9;
    }

    .subjects {
      padding: 20px 8% 60px;
    }

    .subjects h2 {
      font-size: 24px;
      margin-bottom: 25px;
      color: #1f2937;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 24px;
    }

    .subject-card {
      background: white;
      border-radius: 22px;
      padding: 28px 22px;
      text-align: center;
      text-decoration: none;
      color: inherit;
      border: 1px solid #e0e6f0;
      box-shadow: 0 8px 25px rgba(99,102,241,.10);
      transition: .25s ease;
    }

    .subject-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 15px 40px rgba(99,102,241,.18);
    }

    .subject-icon {
      font-size: 40px;
      margin-bottom: 12px;
    }

    .subject-card h3 {
      font-size: 19px;
      color: #3b4fd8;
      margin-bottom: 6px;
    }

    .subject-card p {
      font-size: 14px;
      color: #4b5563;
      line-height: 1.5;
    }

    .locked .subject-icon,
    .locked h3,
    .locked p {
      opacity: .5;
    }

    .lock-badge {
      display: inline-block;
      margin-top: 10px;
      background: #fee2e2;
      color: #b91c1c;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 700;
    }

    @media (max-width: 700px) {
      header {
        flex-direction: column;
        gap: 12px;
        padding: 18px 6%;
        text-align: center;
      }
      .hero { padding: 30px 6% 20px; }
      .hero-card { padding: 28px 22px; border-radius: 24px; }
      .hero-card h1 { font-size: 26px; }
      .subjects { padding: 20px 6% 45px; }
      .subjects h2 { text-align: center; }
      .grid { gap: 16px; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">Maestro de Bolsillo</div>
    <div class="user-badge">
      <span id="userName">Usuario</span>
      <button class="logout-btn" onclick="cerrarSesion()">Salir</button>
    </div>
  </header>

  <section class="hero">
    <div class="hero-card">
      <h1>¿Qué materia estudiarás hoy?</h1>
      <p>Elige una materia y empieza a practicar.</p>
    </div>
  </section>

  <section class="subjects">
    <h2>Materias disponibles</h2>
    <div class="grid" id="subjectsGrid">
      <!-- Se llena con JS -->
    </div>
  </section>

  <script>
    const materias = [
      { id: "matematicas", nombre: "Matemáticas", icono: "📐", desc: "Aritmética, álgebra, geometría" },
      { id: "espanol", nombre: "Español", icono: "📖", desc: "Lectura, gramática, redacción" },
      { id: "civica", nombre: "Cívica y Ética", icono: "⚖️", desc: "Valores, participación, derechos" },
      { id: "historia", nombre: "Historia", icono: "🏛️", desc: "Historia de México y del mundo" },
      { id: "quimica", nombre: "Química", icono: "🧪", desc: "Elementos, reacciones, compuestos" }
    ];

    const mesesAcceso = JSON.parse(localStorage.getItem("meses_acceso") || "[]");
    const nombre = localStorage.getItem("usuario_nombre") || "Alumno";
    document.getElementById("userName").textContent = `👋 ${nombre}`;

    const grid = document.getElementById("subjectsGrid");

    materias.forEach(m => {
      const tieneAcceso = mesesAcceso.length === 0 || mesesAcceso.includes(1);
      const card = document.createElement("a");
      card.className = `subject-card${tieneAcceso ? "" : " locked"}`;
      card.href = tieneAcceso ? `${m.id}.html?mes=1` : "#";

      card.innerHTML = `
        <div class="subject-icon">${m.icono}</div>
        <h3>${m.nombre}</h3>
        <p>${m.desc}</p>
        ${tieneAcceso ? "" : '<div class="lock-badge">🔒 Bloqueado</div>'}
      `;

      grid.appendChild(card);
    });

    function cerrarSesion() {
      localStorage.removeItem("usuario_uid");
      localStorage.removeItem("usuario_nombre");
      localStorage.removeItem("usuario_email");
      localStorage.removeItem("meses_acceso");
      window.location.href = "login.html";
    }
  </script>

</body>
</html>
