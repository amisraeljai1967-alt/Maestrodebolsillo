<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Química Mes 1 | Maestro de Bolsillo</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }

    body { min-height: 100vh; background: #f6f8ff; color: #141a2e; }

    header {
      background: white; padding: 20px 8%; display: flex;
      justify-content: space-between; align-items: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
    }

    .logo { font-size: 22px; font-weight: 800; color: #3454d1; }

    .back-link {
      text-decoration: none; font-weight: 700; color: #3454d1;
      background: #eef1ff; padding: 10px 16px; border-radius: 14px;
    }

    .hero { padding: 40px 8% 25px; }

    .hero-card {
      background: linear-gradient(135deg, #3454d1, #7b4dff);
      color: white; border-radius: 32px; padding: 40px;
      text-align: center; box-shadow: 0 25px 60px rgba(52,84,209,.25);
    }

    .tag {
      display: inline-block; background: rgba(255,255,255,.18);
      color: white; padding: 8px 14px; border-radius: 20px;
      font-size: 14px; font-weight: 700; margin-bottom: 15px;
    }

    h1 { font-size: 36px; margin-bottom: 12px; }

    .hero-card p { font-size: 17px; opacity: .95; line-height: 1.6; }

    .quiz-wrapper { padding: 25px 8% 60px; }

    .quiz-card {
      max-width: 850px; margin: auto; background: white; padding: 35px;
      border-radius: 30px; box-shadow: 0 25px 60px rgba(52,84,209,.15);
    }

    .top-info {
      display: flex; justify-content: space-between; gap: 15px;
      flex-wrap: wrap; margin-bottom: 20px; font-weight: 700; color: #3454d1;
    }

    .pill { background: #eef1ff; padding: 10px 14px; border-radius: 18px; }

    .progress-bar {
      width: 100%; height: 12px; background: #eef1ff;
      border-radius: 99px; overflow: hidden; margin-bottom: 30px;
    }

    .progress-fill {
      height: 100%; width: 0%;
      background: linear-gradient(135deg, #3454d1, #7b4dff);
      border-radius: 99px; transition: width .3s ease;
    }

    .question {
      font-size: 25px; line-height: 1.4; text-align: center;
      margin-bottom: 25px; color: #141a2e; font-weight: 800;
    }

    .options { display: grid; gap: 14px; }

    .option-btn {
      width: 100%; border: 2px solid transparent; background: #f1f4ff;
      padding: 16px 18px; border-radius: 16px; font-size: 17px;
      font-weight: 700; color: #141a2e; cursor: pointer;
      text-align: left; transition: .2s ease;
    }

    .option-btn:hover { transform: translateY(-2px); background: #e5eaff; border-color: #cfd8ff; }

    .option-btn.correct { background: #dff8e9; border-color: #24b36b; color: #157347; }

    .option-btn.incorrect { background: #ffe1e1; border-color: #ff6b6b; color: #b42318; }

    .explanation {
      display: none; margin-top: 25px; background: #fff7df;
      border-left: 6px solid #ffcc4d; padding: 20px;
      border-radius: 18px; line-height: 1.6; color: #3d3d3d;
    }

    .explanation strong { color: #141a2e; }

    .next-btn {
      display: none; margin: 28px auto 0;
      background: linear-gradient(135deg, #3454d1, #7b4dff);
      color: white; padding: 15px 28px; border: none;
      border-radius: 16px; font-size: 16px; font-weight: 800;
      cursor: pointer; box-shadow: 0 12px 30px rgba(52,84,209,.25);
    }

    .result { display: none; text-align: center; padding: 25px; }

    .result h2 { font-size: 34px; color: #3454d1; margin-bottom: 10px; }

    .score-number { font-size: 52px; font-weight: 900; color: #141a2e; margin: 15px 0; }

    .restart-btn {
      margin-top: 20px; background: linear-gradient(135deg, #3454d1, #7b4dff);
      color: white; padding: 14px 24px; border-radius: 14px;
      border: none; font-weight: 800; cursor: pointer;
    }

    @media (max-width: 700px) {
      header { flex-direction: column; gap: 12px; padding: 18px 6%; text-align: center; }
      .hero { padding: 25px 6% 15px; }
      .hero-card { padding: 28px 22px; border-radius: 24px; }
      h1 { font-size: 28px; }
      .quiz-wrapper { padding: 20px 6% 45px; }
      .quiz-card { padding: 24px; border-radius: 24px; }
      .top-info { justify-content: center; text-align: center; }
      .question { font-size: 21px; }
      .option-btn { font-size: 15px; text-align: center; }
      .next-btn, .restart-btn { width: 100%; }
    }
  </style>
</head>

<body>

  <header>
    <div class="logo">Maestro de Bolsillo</div>
    <a class="back-link" href="index.html">← Volver al inicio</a>
  </header>

  <section class="hero">
    <div class="hero-card">
      <span class="tag">Química · Mes 1</span>

<h1>Descubre cómo funciona el mundo que te rodea</h1>

<p>
  Practica materia, mezclas, átomos, tabla periódica, reacciones químicas y
  conceptos fundamentales mediante preguntas explicadas paso a paso.
</p>
    </div>
  </section>

  <section class="quiz-wrapper">
    <div class="quiz-card">

      <div class="top-info">
        <div class="pill" id="progressText">Cargando preguntas...</div>
        <div class="pill" id="scoreText">Aciertos: 0</div>
      </div>

      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>

      <div id="quizArea"></div>

      <div class="explanation" id="explanationBox"></div>

      <button class="next-btn" id="nextBtn" onclick="nextQuestion()">
        Siguiente pregunta →
      </button>

      <div class="result" id="resultBox"></div>

    </div>
  </section>

  <script>
    let questions = [];
    let currentQuestion = 0;
    let score = 0;
    let answered = false;

    fetch("quimica_mes2.json")
      .then(response => response.json())
      .then(data => {
        questions = data;
        showQuestion();
      })
      .catch(error => {
        document.getElementById("quizArea").innerHTML =
          "<p>No se pudieron cargar las preguntas. Revisa que el archivo quimica_mes1.json esté en GitHub.</p>";
        console.error("Error:", error);
      });

    function showQuestion() {
      answered = false;

      const question = questions[currentQuestion];
      const progressPercent = ((currentQuestion) / questions.length) * 100;

      document.getElementById("progressText").textContent =
        `Pregunta ${currentQuestion + 1} de ${questions.length}`;

      document.getElementById("scoreText").textContent =
        `Aciertos: ${score}`;

      document.getElementById("progressFill").style.width =
        `${progressPercent}%`;

      document.getElementById("explanationBox").style.display = "none";
      document.getElementById("explanationBox").innerHTML = "";
      document.getElementById("nextBtn").style.display = "none";
      document.getElementById("resultBox").style.display = "none";

      document.getElementById("quizArea").innerHTML = `
        <div class="question">${question.question}</div>

        <div class="options">
          <button class="option-btn" onclick="checkAnswer('A', this)">A) ${question.options.A}</button>
          <button class="option-btn" onclick="checkAnswer('B', this)">B) ${question.options.B}</button>
          <button class="option-btn" onclick="checkAnswer('C', this)">C) ${question.options.C}</button>
          <button class="option-btn" onclick="checkAnswer('D', this)">D) ${question.options.D}</button>
        </div>
      `;
    }

    function checkAnswer(selected, button) {
      if (answered) return;

      answered = true;

      const question = questions[currentQuestion];
      const buttons = document.querySelectorAll(".option-btn");

      buttons.forEach(btn => {
        btn.disabled = true;

        if (btn.textContent.startsWith(question.correctAnswer + ")")) {
          btn.classList.add("correct");
        }
      });

      if (selected === question.correctAnswer) {
        button.classList.add("correct");
        score++;
      } else {
        button.classList.add("incorrect");
      }

      document.getElementById("scoreText").textContent =
        `Aciertos: ${score}`;

      document.getElementById("explanationBox").style.display = "block";
      document.getElementById("explanationBox").innerHTML = `
        <strong>💡 Explicación:</strong><br>
        ${question.explanation}
      `;

      document.getElementById("nextBtn").style.display = "block";
    }

    function nextQuestion() {
      currentQuestion++;

      if (currentQuestion < questions.length) {
        showQuestion();
      } else {
        showResult();
      }
    }

    function showResult() {
      const percentage = Math.round((score / questions.length) * 100);

      document.getElementById("progressText").textContent = "Quiz terminado";
      document.getElementById("scoreText").textContent = `Aciertos: ${score}`;
      document.getElementById("progressFill").style.width = "100%";
      document.getElementById("quizArea").innerHTML = "";
      document.getElementById("explanationBox").style.display = "none";
      document.getElementById("nextBtn").style.display = "none";

      document.getElementById("resultBox").style.display = "block";
      document.getElementById("resultBox").innerHTML = `
        <h2>🎉 ¡Terminaste!</h2>
        <p>Tu resultado final fue:</p>
        <div class="score-number">${score}/${questions.length}</div>
        <p>${percentage}% de respuestas correctas</p>
        <button class="restart-btn" onclick="restartQuiz()">Repetir quiz</button>
      `;
    }

    function restartQuiz() {
      currentQuestion = 0;
      score = 0;
      showQuestion();
    }
  </script>

</body>
</html>
