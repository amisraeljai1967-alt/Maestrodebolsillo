<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Matemáticas Mes 1</title>
</head>

<body>

<h1>Quiz de Matemáticas - Mes 1</h1>

<div id="quiz">
Cargando preguntas...
</div>

<script>
fetch('matematicas_mes1.json')
  .then(response => response.json())
  .then(data => {

    const pregunta = data[0];
    console.log(data);

    document.getElementById("quiz").innerHTML = `
      <h2>${pregunta.question}</h2>

      <p>A) ${pregunta.options.A}</p>
      <p>B) ${pregunta.options.B}</p>
      <p>C) ${pregunta.options.C}</p>
      <p>D) ${pregunta.options.D}</p>
    `;
  });
</script>

</body>
</html>
