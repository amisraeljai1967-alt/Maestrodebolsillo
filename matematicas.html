<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Matemáticas Mes 1 | Maestro de Bolsillo</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }

    body { min-height: 100vh; background: #f0f4fe; color: #141a2e; }

    header { background: white; padding: 20px 8%; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }

    .logo { font-size: 22px; font-weight: 800; color: #3b4fd8; }

    .back-link { text-decoration: none; font-weight: 700; color: #3b4fd8; background: #dce3ff; padding: 10px 16px; border-radius: 14px; }

    .hero { padding: 40px 8% 25px; }

    .hero-card { background: linear-gradient(135deg, #6366f1, #4f46e5); color: white; border-radius: 32px; padding: 40px; text-align: center; box-shadow: 0 25px 60px rgba(99,102,241,.25); }

    .tag { display: inline-block; background: rgba(255,255,255,.18); color: white; padding: 8px 14px; border-radius: 20px; font-size: 14px; font-weight: 700; margin-bottom: 15px; }

    h1 { font-size: 36px; margin-bottom: 12px; }

    .hero-card p { font-size: 17px; opacity: .95; line-height: 1.6; }

    .quiz-wrapper { padding: 25px 8% 60px; }

    .quiz-card { max-width: 850px; margin: auto; background: white; padding: 35px; border-radius: 30px; border: 1px solid #e0e6f0; box-shadow: 0 25px 60px rgba(99,102,241,.15); }

    .top-info { display: flex; justify-content: space-between; gap: 15px; flex-wrap: wrap; margin-bottom: 20px; font-weight: 700; color: #3b4fd8; }

    .pill { background: #dce3ff; padding: 10px 14px; border-radius: 18px; }

    .progress-bar { width: 100%; height: 12px; background: #dce3ff; border-radius: 99px; overflow: hidden; margin-bottom: 30px; }

    .progress-fill { height: 100%; width: 0%; background: linear-gradient(135deg, #6366f1, #4f46e5); border-radius: 99px; transition: width .3s ease; }

    .question { font-size: 25px; line-height: 1.4; text-align: center; margin-bottom: 25px; color: #141a2e; font-weight: 800; }

    .options { display: grid; gap: 14px; }

    .option-btn { width: 100%; border: 2px solid transparent; background: #e8edff; padding: 16px 18px; border-radius: 16px; font-size: 17px; font-weight: 700; color: #141a2e; cursor: pointer; text-align: left; transition: .2s ease; }

    .option-btn:hover { transform: translateY(-2px); background: #dde4ff; border-color: #d4dcf5; }

    .option-btn.correct { background: #dff8e9; border-color: #24b36b; color: #157347; }

    .option-btn.incorrect { background: #ffe1e1; border-color: #ff6b6b; color: #b42318; }

    .explanation { display: none; margin-top: 25px; background: #fff7df; border-left: 6px solid #ffcc4d; padding: 20px; border-radius: 18px; line-height: 1.6; color: #111111; font-weight: bold; }

    .explanation strong { color: #141a2e; }

    .next-btn { display: none; margin: 28px auto 0; background: linear-gradient(135deg, #6366f1, #4f46e5); color: white; padding: 15px 28px; border: none; border-radius: 16px; font-size: 16px; font-weight: 800; cursor: pointer; box-shadow: 0 12px 30px rgba(99,102,241,.25); }

    .result { display: none; text-align: center; padding: 25px; }

    .result h2 { font-size: 34px; color: #3b4fd8; margin-bottom: 10px; }

    .score-number { font-size: 52px; font-weight: 900; color: #141a2e; margin: 15px 0; }

    .restart-btn { margin-top: 20px; background: linear-gradient(135deg, #6366f1, #4f46e5); color: white; padding: 14px 24px; border-radius: 14px; border: none; font-weight: 800; cursor: pointer; }

    #access-error { display: none; text-align: center; padding: 40px; }
    #access-error h2 { color: #c0392b; margin-bottom: 12px; }
    #access-error p { color: #4b5563; margin-bottom: 20px; }

    @media (max-width: 700px) {
      header { flex-direction: column; gap: 12px; padding: 18px 6%; text-align: center; }
      .hero { padding: 25px 6% 15px; }
      .hero-card { padding: 28px 22px; border-radius: 24px; }
      h1 { font-size: 28px; }
      .quiz-wrapper { padding: 20px 6% 45px; }
      .quiz-card { padding: 24px; border-radius: 24px; }
      .top-info { justify-content: center; text-align: center; }
      .question { font-size: 21px; }
      .option-btn { font-size: 15px; text-align: center; }
      .next-btn, .restart-btn { width: 100%; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">Maestro de Bolsillo</div>
    <a class="back-link" href="dashboard.html">← Mis materias</a>
  </header>

  <section class="hero">
    <div class="hero-card">
      <span class="tag" id="heroTag">Matemáticas</span>
      <h1>Practica, responde y aprende de tus errores</h1>
      <p>Elige una respuesta, revisa la explicación y avanza paso a paso.</p>
    </div>
  </section>

  <section class="quiz-wrapper">
    <div id="access-error">
      <h2>Sin acceso</h2>
      <p>No tienes acceso a este contenido. Adquiere el mes correspondiente en Hotmart.</p>
      <a href="https://pay.hotmart.com/X106434037V" style="display:inline-block;padding:14px 24px;background:#3b4fd8;color:white;border-radius:10px;text-decoration:none;font-weight:bold;">Comprar acceso</a>
    </div>

    <div class="quiz-card" id="quizContent">
      <div class="top-info">
        <div class="pill" id="progressText">Cargando preguntas...</div>
        <div class="pill" id="scoreText">Aciertos: 0</div>
      </div>

      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>

      <div id="quizArea"></div>

      <div class="explanation" id="explanationBox"></div>

      <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Siguiente pregunta →</button>

      <div class="result" id="resultBox"></div>
    </div>
  </section>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const mes = urlParams.get("mes") || "1";
    const mesesAcceso = JSON.parse(localStorage.getItem("meses_acceso") || "[]");
    const mesNum = parseInt(mes);
    if (!mesesAcceso.includes(mesNum)) {
      document.getElementById("access-error").style.display = "block";
      document.getElementById("quizContent").style.display = "none";
      document.getElementById("heroTag").textContent = "Matemáticas - Sin acceso";
      throw new Error("Sin acceso al mes " + mes);
    }
    if (!localStorage.getItem("usuario_uid")) {
      window.location.href = "/login.html";
    }
    document.getElementById("heroTag").textContent = `Matemáticas · Mes ${mes}`;
    let questions = [];
    let currentQuestion = 0;
    let score = 0;
    let answered = false;
    fetch(`matematicas_mes${mes}.json`)
      .then(response => response.json())
      .then(data => {
        questions = Array.isArray(data) ? data : (data.preguntas || []);
        if (questions.length === 0) throw new Error("No se encontraron preguntas");
        showQuestion();
      })
      .catch(error => {
        document.getElementById("quizArea").innerHTML = "<p>No se pudieron cargar las preguntas. Verifica que el archivo exista en GitHub.</p>";
        console.error("Error:", error);
      });
    function showQuestion() {
      answered = false;
      const question = questions[currentQuestion];
      const progressPercent = (currentQuestion / questions.length) * 100;
      document.getElementById("progressText").textContent = `Pregunta ${currentQuestion + 1} de ${questions.length}`;
      document.getElementById("scoreText").textContent = `Aciertos: ${score}`;
      document.getElementById("progressFill").style.width = `${progressPercent}%`;
      document.getElementById("explanationBox").style.display = "none";
      document.getElementById("explanationBox").innerHTML = "";
      document.getElementById("nextBtn").style.display = "none";
      document.getElementById("resultBox").style.display = "none";
      const qText = question.question || question.pregunta;
      const opts = question.options || {};
      document.getElementById("quizArea").innerHTML = `
        <div class="question">${qText || "Pregunta no disponible"}</div>
        <div class="options">
          <button class="option-btn" onclick="checkAnswer('A', this)">A) ${opts.A || "?"}</button>
          <button class="option-btn" onclick="checkAnswer('B', this)">B) ${opts.B || "?"}</button>
          <button class="option-btn" onclick="checkAnswer('C', this)">C) ${opts.C || "?"}</button>
          <button class="option-btn" onclick="checkAnswer('D', this)">D) ${opts.D || "?"}</button>
        </div>`;
    }
    function checkAnswer(selected, button) {
      if (answered) return;
      answered = true;
      const question = questions[currentQuestion];
      const correctKey = question.correctAnswer || question.respuesta;
      const buttons = document.querySelectorAll(".option-btn");
      buttons.forEach(btn => {
        btn.disabled = true;
        if (btn.textContent.startsWith(correctKey + ")")) { btn.classList.add("correct"); }
      });
      if (selected === correctKey) { button.classList.add("correct"); score++; }
      else { button.classList.add("incorrect"); }
      document.getElementById("scoreText").textContent = `Aciertos: ${score}`;
      const explanation = question.explanation || question.explicacion || "";
      document.getElementById("explanationBox").style.display = "block";
      document.getElementById("explanationBox").innerHTML = `<strong>Explicación:</strong><br>${explanation}`;
      document.getElementById("nextBtn").style.display = "block";
    }
    function nextQuestion() {
      currentQuestion++;
      if (currentQuestion < questions.length) { showQuestion(); }
      else { showResult(); }
    }
    function showResult() {
      const percentage = Math.round((score / questions.length) * 100);
      document.getElementById("progressText").textContent = "Quiz terminado";
      document.getElementById("scoreText").textContent = `Aciertos: ${score}`;
      document.getElementById("progressFill").style.width = "100%";
      document.getElementById("quizArea").innerHTML = "";
      document.getElementById("explanationBox").style.display = "none";
      document.getElementById("nextBtn").style.display = "none";
      document.getElementById("resultBox").style.display = "block";
      document.getElementById("resultBox").innerHTML = `<h2>¡Terminaste!</h2><p>Tu resultado final fue:</p><div class="score-number">${score}/${questions.length}</div><p>${percentage}% de respuestas correctas</p><button class="restart-btn" onclick="restartQuiz()">Repetir quiz</button>`;
    }
    function restartQuiz() { currentQuestion = 0; score = 0; showQuestion(); }
  </script>

</body>
</html>
