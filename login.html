<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar Sesión | Maestro de Bolsillo</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f0f4fe;
      padding: 20px;
    }

    .card {
      background: white;
      max-width: 420px;
      width: 100%;
      padding: 40px 34px;
      border-radius: 28px;
      border: 1px solid #e0e6f0;
      box-shadow: 0 25px 60px rgba(99,102,241,.15);
    }

    .card h1 {
      font-size: 28px;
      color: #1f2937;
      margin-bottom: 6px;
      text-align: center;
    }

    .card p {
      text-align: center;
      color: #4b5563;
      margin-bottom: 24px;
      font-size: 15px;
    }

    .logo {
      font-size: 20px;
      font-weight: 800;
      color: #3b4fd8;
      text-align: center;
      margin-bottom: 20px;
    }

    .field {
      margin-bottom: 18px;
    }

    .field label {
      display: block;
      font-weight: 700;
      font-size: 14px;
      color: #374151;
      margin-bottom: 5px;
    }

    .field input {
      width: 100%;
      padding: 13px 16px;
      border: 2px solid #d0d9f0;
      border-radius: 14px;
      font-size: 15px;
      outline: none;
      transition: .2s;
    }

    .field input:focus {
      border-color: #3b4fd8;
    }

    .btn {
      width: 100%;
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: white;
      border: none;
      padding: 14px;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 8px 25px rgba(99,102,241,.25);
      transition: .2s;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .error-msg {
      color: #b42318;
      background: #ffe1e1;
      padding: 12px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      text-align: center;
      margin-bottom: 16px;
      display: none;
    }

    .link {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: #4b5563;
    }

    .link a {
      color: #3b4fd8;
      font-weight: 700;
      text-decoration: none;
    }

    .back-home {
      text-align: center;
      margin-top: 12px;
    }

    .back-home a {
      color: #4b5563;
      font-size: 14px;
      text-decoration: none;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="logo">Maestro de Bolsillo</div>
    <h1>Iniciar sesión</h1>
    <p>Accede a tus materias y continúa practicando</p>

    <div class="error-msg" id="errorMsg"></div>

    <form id="loginForm">
      <div class="field">
        <label>Correo electrónico</label>
        <input type="email" id="email" placeholder="correo@ejemplo.com" required />
      </div>

      <div class="field">
        <label>Contraseña</label>
        <input type="password" id="password" placeholder="••••••••" required />
      </div>

      <button type="submit" class="btn">Entrar</button>
    </form>

    <div class="link">
      ¿No tienes cuenta? <a href="register.html">Regístrate aquí</a>
    </div>
    <div class="back-home">
      <a href="index.html">← Volver al inicio</a>
    </div>
  </div>

  <script>
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD9kagpjBX7lV-UIbpym0JACmpcQWj8L6I",
      authDomain: "maestro-de-bolsillo-d8acb.firebaseapp.com",
      projectId: "maestro-de-bolsillo-d8acb",
      storageBucket: "maestro-de-bolsillo-d8acb.appspot.com",
      messagingSenderId: "926780484863",
      appId: "1:926780484863:web:805b7a13093eb7e4f855a0"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const errorMsg = document.getElementById("errorMsg");

      errorMsg.style.display = "none";

      try {
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        const docRef = doc(db, "usuarios", user.uid);
        const docSnap = await getDoc(docRef);

        if (docSnap.exists()) {
          const data = docSnap.data();
          localStorage.setItem("usuario_uid", user.uid);
          localStorage.setItem("usuario_nombre", data.nombre || "Alumno");
          localStorage.setItem("usuario_email", user.email);
          localStorage.setItem("meses_acceso", JSON.stringify(data.meses_acceso || []));
        } else {
          localStorage.setItem("usuario_uid", user.uid);
          localStorage.setItem("usuario_nombre", "Alumno");
          localStorage.setItem("usuario_email", user.email);
          localStorage.setItem("meses_acceso", "[]");
        }

        window.location.href = "dashboard.html";
      } catch (error) {
        let mensaje = "Error al iniciar sesión. Verifica tus datos.";
        if (error.code === "auth/user-not-found") mensaje = "No hay cuenta con este correo.";
        else if (error.code === "auth/wrong-password") mensaje = "Contraseña incorrecta.";
        else if (error.code === "auth/invalid-email") mensaje = "Correo inválido.";
        else if (error.code === "auth/invalid-credential") mensaje = "Correo o contraseña incorrectos.";
        errorMsg.textContent = mensaje;
        errorMsg.style.display = "block";
      }
    });
  </script>

</body>
</html>
